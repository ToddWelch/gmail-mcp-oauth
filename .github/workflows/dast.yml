name: DAST

# Dynamic Application Security Testing (DAST) against the deployed production
# service, per the security-scanning policy: "OWASP ZAP baseline scan runs
# monthly against the production environment via scheduled workflow."
#
# This is a scheduled MONITOR of the running app, not a PR gate. It deliberately
# does NOT trigger on push or pull_request: running a live scan against prod on
# every PR is wrong (it probes the production host, not the code under review).
# It runs on a monthly cron plus manual dispatch for on-demand runs.
#
# Scope: the OWASP ZAP *baseline* (passive) scan only. Baseline is passive and
# non-intrusive: it spiders the target and inspects the traffic that normal use
# produces, without launching attacks. The policy's annual *active* scan
# (intrusive: injects payloads) is intentionally NOT wired up here; see the PR
# body / follow-up. The production target is a real MCP/OAuth server whose main
# surface requires auth, so the baseline mostly exercises the PUBLIC surface
# (root, health, OAuth routes). That coverage is expected and fine.
on:
  schedule:
    # 05:00 UTC on the 1st of every month (low-traffic window).
    - cron: "0 5 1 * *"
  workflow_dispatch:

# Least privilege. contents:read to check out the workflow; issues:write so the
# action can open/update the findings issue (allow_issue_writing, default on).
permissions:
  contents: read
  issues: write

concurrency:
  group: dast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    name: OWASP ZAP baseline (production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          # Deployed production mcp-gmail service (Railway).
          target: "https://mcp-gmail-production-ab2b.up.railway.app"
          # fail_action:false keeps this a non-blocking monitor. It will NOT
          # hard-fail the workflow on low/medium/informational warnings, which
          # a scheduled monthly run would otherwise turn into recurring noise.
          # Findings are surfaced instead through the auto-opened GitHub issue
          # (allow_issue_writing, on by default) and the uploaded report
          # artifact below, so HIGH-risk alerts stay visible without a red X on
          # every routine run. A hard gate belongs on the annual active scan,
          # not on the passive baseline monitor.
          fail_action: false
          # Auto-file/update a single tracking issue with the scan results.
          allow_issue_writing: true
          issue_title: "DAST: OWASP ZAP baseline (production)"
          # Name of the artifact the action uploads with the HTML/JSON/MD
          # reports; retrievable from the workflow run.
          artifact_name: "zap-baseline-report"
