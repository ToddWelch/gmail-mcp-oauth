version: 2

# Daily dependency version-update scanning. This file configures the
# version-update PRs only. The Dependabot *security-alert* toggle
# (Settings > Code security > Dependabot alerts / security updates) is a
# repository setting, not a file, and must be enabled separately.
updates:
  # Python dependencies. The pip ecosystem reads pyproject.toml and the
  # pip-compile lockfiles; Dependabot opens PRs that bump the pins and
  # regenerate hashes. Grouped so related bumps arrive as one PR rather
  # than a flood of single-package PRs.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by the CI and Security workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  # Base image in mcp.Dockerfile. Dependabot's docker ecosystem discovers
  # *.Dockerfile in the target directory and opens PRs bumping the pinned
  # FROM digest. Newer base digests carry fixed build tooling
  # (pip/setuptools/wheel and vendored deps like jaraco.*), which is why the
  # Trivy image scan gates the OS layer only and leaves base-image Python
  # tooling to flow in through these digest-bump PRs instead of a hard gate.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
